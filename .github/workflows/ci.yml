name: CI

# Runs on every push and pull request to any branch.
on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  phpcs:
    name: PHP Coding Standards (PHP ${{ matrix.php }})
    runs-on: ubuntu-latest

    strategy:
      matrix:
        php: ["8.0", "8.1", "8.2", "8.3"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP ${{ matrix.php }}
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          tools: composer:v2

      - name: Install Composer dependencies
        run: composer install --prefer-dist --no-progress --no-scripts

      - name: Run PHPCS
        run: composer phpcs

  lint-php:
    name: PHP Syntax (PHP ${{ matrix.php }})
    runs-on: ubuntu-latest

    strategy:
      matrix:
        php: ["8.0", "8.1", "8.2", "8.3"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP ${{ matrix.php }}
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}

      - name: Check syntax on all PHP files
        run: find . -name "*.php" -not -path "*/vendor/*" -print0 | xargs -0 -n1 php -l
